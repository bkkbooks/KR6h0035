body:
  text: 寶髻經四法憂波提舍飜譯之記寶髻經者是大集中之一集也其宗四法玄深奧密天親菩薩略開其門是故名為憂波提舍聖自在力行之彼古時人處會出於此今興和三年歲次辛酉九月朔旦庚午之日烏萇國人剎利王種三藏法師毘目智仙中天竺國婆羅門人瞿曇流支護法大士魏驃騎大將軍開府儀同三司御史中尉勃海高仲密愛法之人沙門曇林道俗相假於鄴城內金華寺譯四千九百九十七字
